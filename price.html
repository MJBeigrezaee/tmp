<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاسبه‌گر زنده طلا و یورو</title>
    <style>
        body {
            font-family: Tahoma, Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 1.4rem;
        }
        .widget-box {
            background: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            min-height: 60px;
        }
        .result-box {
            background: #e8f5e9;
            border: 2px dashed #4caf50;
            border-radius: 8px;
            padding: 20px;
            margin-top: 25px;
        }
        .result-title {
            font-size: 1.1rem;
            color: #2e7d32;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .result-value {
            font-size: 1.6rem;
            color: #1b5e20;
            font-weight: bold;
            font-family: monospace;
        }
        button {
            background-color: #2196f3;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #1e88e5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 نرخ لحظه‌ای بازار آزاد (TGJU)</h2>

    <div class="widget-box" id="gold-section">
        <span style="font-weight: bold; display:block; margin-bottom: 5px;">🔸 طلای ۱۸ عیار (هر گرم):</span>
        <tgju type="ticker-single" items="137121" columns="dot" token="webservice"></tgju>
    </div>

    <div class="widget-box" id="eur-section">
        <span style="font-weight: bold; display:block; margin-bottom: 5px;">💶 یورو بازار آزاد:</span>
        <tgju type="ticker-single" items="137205" columns="dot" token="webservice"></tgju>
    </div>

    <div class="result-box">
        <div class="result-title">✨ قیمت هر گرم طلا به یورو:</div>
        <div id="final-ratio" class="result-value">در حال محاسبه...</div>
    </div>

    <button onclick="calculateRatio()">🔄 محاسبه مجدد نسبت</button>
</div>

<script src="https://api.tgju.org/v1/widget/v2" defer></script>

<script>
    function calculateRatio() {
        try {
            // هدف‌گیری مستقیم کلاس‌های قیمت رندر شده توسط ویجت
            const priceElements = document.querySelectorAll('.tgju-widget-current-price');
            
            if (priceElements.length >= 2) {
                // المان اول طلا و المان دوم یورو است
                const goldText = priceElements[0].innerText || priceElements[0].textContent;
                const eurText = priceElements[1].innerText || priceElements[1].textContent;
                
                // پاک‌سازی رشته‌ها و تبدیل به عدد شناور
                const goldPrice = parseFloat(goldText.replace(/,/g, '').replace(/[آ-ی]/g, '').trim());
                const eurPrice = parseFloat(eurText.replace(/,/g, '').replace(/[آ-ی]/g, '').trim());

                if (goldPrice > 0 && eurPrice > 0) {
                    const ratio = (goldPrice / eurPrice).toFixed(2);
                    document.getElementById('final-ratio').innerText = ratio + " EUR";
                } else {
                    document.getElementById('final-ratio').innerText = "خطا در پردازش ارقام";
                }
            } else {
                document.getElementById('final-ratio').innerText = "در حال دریافت دیتا از سرور مرکزی...";
            }
        } catch (e) {
            document.getElementById('final-ratio').innerText = "خطا در محاسبات داخلی";
        }
    }

    // بررسی دوره‌ای تا به محض لود شدن دیتای سرور، محاسبات انجام شود
    const checkInterval = setInterval(() => {
        const elements = document.querySelectorAll('.tgju-widget-current-price');
        if (elements.length >= 2 && elements[0].innerText !== "") {
            calculateRatio();
            clearInterval(checkInterval); // متوقف کردن بررسی بعد از اولین محاسبه موفق
        }
    }, 500);

    // زمان‌بندی زاپاس برای اطمینان نهایی
    window.addEventListener('load', () => {
        setTimeout(calculateRatio, 3000);
    });
</script>

</body>
</html>

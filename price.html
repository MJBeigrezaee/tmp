<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبورد زنده نرخ طلا و یورو</title>
    <style>
        /* تعریف فونت استاندارد و زیبای همگانی */
        @import url('https://v1.fontapi.ir/css/Vazir');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Vazir', Tahoma, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* کارت مدرن شیشه‌ای */
        .dashboard-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 35px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: #38bdf8;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 18px 20px;
            border-radius: 16px;
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }

        .price-row:hover {
            border-color: rgba(56, 189, 248, 0.4);
            transform: translateY(-2px);
        }

        .label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            color: #94a3b8;
        }

        .value {
            font-size: 1.25rem;
            font-weight: 700;
            color: #f8fafc;
            font-family: monospace, 'Vazir';
        }

        /* باکس متمایز برای نسبت طلا به یورو */
        .ratio-box {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.2) 0%, rgba(56, 189, 248, 0.05) 100%);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 20px;
            padding: 25px;
            margin-top: 25px;
            position: relative;
            overflow: hidden;
        }

        .ratio-title {
            font-size: 0.95rem;
            color: #38bdf8;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .ratio-value {
            font-size: 2.2rem;
            font-weight: 800;
            color: #38bdf8;
            font-family: monospace;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .currency-badge {
            font-size: 1rem;
            font-weight: 500;
            margin-right: 5px;
        }

        .update-time {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 25px;
        }

        /* انیمیشن لودینگ در حالت انتظار */
        .loading {
            color: #64748b;
            font-size: 0.9rem;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* 🔴 بخش جادویی: مخفی کردن کامل ویجت‌های TGJU از دید کاربر */
        #tgju-hidden-widgets {
            display: none !important;
            visibility: hidden !important;
            height: 0 !important;
            width: 0 !important;
            overflow: hidden !important;
        }
    </style>
</head>
<body>

<div class="dashboard-card">
    <h2>
        <span>📊</span>
        داشبورد محاسباتی نرخ ارز و طلا
    </h2>

    <!-- ردیف طلا -->
    <div class="price-row">
        <div class="label">
            <span>🔸</span>
            <span>طلای ۱۸ عیار (گرم)</span>
        </div>
        <div id="display-gold" class="value loading">در حال دریافت...</div>
    </div>

    <!-- ردیف یورو -->
    <div class="price-row">
        <div class="label">
            <span>💶</span>
            <span>یورو بازار آزاد</span>
        </div>
        <div id="display-euro" class="value loading">در حال دریافت...</div>
    </div>

    <!-- باکس نسبت اختصاصی شما -->
    <div class="ratio-box">
        <div class="ratio-title">✨ نسبت هر گرم طلا به یورو</div>
        <div id="display-ratio" class="ratio-value loading">--.--</div>
    </div>

    <!-- زمان بروزرسانی -->
    <div id="display-time" class="update-time">در انتظار سینک با بازار آزاد تهران...</div>
</div>


<!-- 🔴 این همان باکسی است که ویجت‌ها درونش رندر می‌شوند ولی هیچ‌کس آن را نمی‌بیند -->
<div id="tgju-hidden-widgets">
    <tgju type="ticker-single" items="137121" columns="dot" token="webservice"></tgju>
    <tgju type="ticker-single" items="137205" columns="dot" token="webservice"></tgju>
</div>

<!-- بارگزاری اسکریپت اصلی TGJU -->
<script src="https://api.tgju.org/v1/widget/v2" defer></script>

<script>
    function updateCustomDashboard() {
        try {
            // پیدا کردن المان‌های قیمت رندر شده در باکس مخفی
            const hiddenPrices = document.querySelectorAll('#tgju-hidden-widgets .tgju-widget-current-price');
            
            if (hiddenPrices.length >= 2) {
                const rawGold = hiddenPrices[0].innerText || hiddenPrices[0].textContent;
                const rawEuro = hiddenPrices[1].innerText || hiddenPrices[1].textContent;
                
                // پاکسازی کاماها برای محاسبات ریاضی
                const goldNum = parseFloat(rawGold.replace(/,/g, '').trim());
                const euroNum = parseFloat(rawEuro.replace(/,/g, '').trim());

                if (goldNum > 0 && euroNum > 0) {
                    // محاسبه نسبت طلا به یورو
                    const ratio = (goldNum / euroNum).toFixed(2);
                    
                    // تزریق دیتا به پلتفرم قشنگ و مدرن خودمان
                    const goldContainer = document.getElementById('display-gold');
                    const euroContainer = document.getElementById('display-euro');
                    const ratioContainer = document.getElementById('display-ratio');
                    
                    // حذف کلاس لودینگ
                    goldContainer.classList.remove('loading');
                    euroContainer.classList.remove('loading');
                    ratioContainer.classList.remove('loading');
                    
                    // نمایش با فرمت شیک ریال
                    goldContainer.innerText = parseInt(goldNum).toLocaleString() + " ریال";
                    euroContainer.innerText = parseInt(euroNum).toLocaleString() + " ریال";
                    
                    // نمایش نسبت با ابهت بالا!
                    ratioContainer.innerHTML = ratio + '<span class="currency-badge">EUR</span>';
                    
                    // ثبت دقیق زمان سیستم به شمسی/تهران
                    const now = new Date().toLocaleString("fa-IR", { timeZone: "Asia/Tehran" });
                    document.getElementById('display-time').innerText = `آخرین همگام‌سازی زنده: ${now} (به وقت تهران)`;
                    
                    // متوقف کردن حلقه چک کردن چون دیتا با موفقیت گرفته شد
                    clearInterval(widgetWatcher);
                }
            }
        } catch (error) {
            console.log("رندر داخلی در انتظار تغییرات پکیج...");
        }
    }

    // چک کردن مداوم صفحه در پشت صحنه (هر ۵۰۰ میلی‌ثانیه) تا وقتی ویجت مخفی لود شود
    const widgetWatcher = setInterval(() => {
        const elements = document.querySelectorAll('#tgju-hidden-widgets .tgju-widget-current-price');
        if (elements.length >= 2 && elements[0].innerText !== "") {
            updateCustomDashboard();
        }
    }, 500);
</script>

</body>
</html>
